name: Build and Push Docker Image

# When should this pipeline run?
on:
  push:
    branches: ["main"]        # every time you push to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest    # GitHub gives us a fresh Linux machine to work on
    permissions:
      contents: read
      packages: write         # allow pushing the image to your GitHub registry

    steps:
      # 1. Download your code onto the runner
      - name: Check out the code
        uses: actions/checkout@v4

      # 2. Work out a lowercase image name (registries require lowercase)
      - name: Set image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/my-website" >> "$GITHUB_ENV"

      # 3. Log in to GitHub's Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Build the image from your Dockerfile and push it
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
